name: Deploy static site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          # Copy project content to Pages artifact directory.
          rsync -a \
            --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ _site/

          # Ensure GitHub Pages serves files exactly as-is.
          touch _site/.nojekyll

          # For project pages (no CNAME), prefix root-absolute URLs with /<repo>.
          # This keeps mirrored Cargo paths working on https://<user>.github.io/<repo>/.
          if [[ ! -f CNAME ]]; then
            BASE="/${GITHUB_REPOSITORY#*/}"
            PAGES_HOST="${GITHUB_REPOSITORY_OWNER}.github.io"
            echo "Rewriting root-absolute paths with base: ${BASE}"

            find _site -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) -print0 \
              | xargs -0 sed -i.bak \
                  -e "s|href=\"/|href=\"${BASE}/|g" \
                  -e "s|src=\"/|src=\"${BASE}/|g" \
                  -e "s|content=\"/|content=\"${BASE}/|g" \
                  -e "s|url('/|url('${BASE}/|g" \
                  -e "s|url(\"/|url(\"${BASE}/|g" \
                  -e "s|\":\"/|\":\"${BASE}/|g" \
                  -e "s|\"hostname\":\"127\\.0\\.0\\.1:8080\"|\"hostname\":\"${PAGES_HOST}\"|g"

            find _site -name '*.bak' -delete
          else
            echo "CNAME found, keep root-absolute paths as-is."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
