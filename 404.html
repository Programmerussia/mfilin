<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting</title>
    <meta http-equiv="refresh" content="0; url=home2/" />
    <script>
      (function () {
        var target = new URL('home2/', document.baseURI).toString();
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    Redirecting to <a href="home2/">home page</a>...
  </body>
</html>
